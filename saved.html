<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime List — Saved Anime</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <span class="site-nav__logo">Anime List</span>

      <div class="site-nav__links">
        <a href="index.html">Home</a>
        <a href="saved.html" aria-current="page">Saved Anime</a>
        <a href="#">Test Page</a>
      </div>

      <div class="site-nav__actions">
        <span id="nav-user"></span>
        <a href="login.html" id="login-link">Account</a>
        <button id="logout-btn" type="button" hidden>Logout</button>
      </div>
    </nav>
  </header>

  <main class="saved-main">
    <section class="saved-intro" aria-labelledby="saved-title">
      <h1 id="saved-title">Saved Anime</h1>
      <p>Manage the anime titles saved in your account and update your personal watch status.</p>
    </section>

    <section class="saved-section" aria-labelledby="saved-list-title">
      <h2 id="saved-list-title">My List</h2>
      <p id="saved-empty" class="saved-empty" hidden>No anime saved yet. Go to the Home page and press Save on any title.</p>
      <div id="saved-grid" class="saved-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Anime List project</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/saved.js"></script>
</body>
</html>
